<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Matrícula - Instituto Evangelico Jasama </title>
    <link rel="stylesheet" href="style/stylecontacto.css">
</head>
<body>

<main>

    <header>
        <h1>Instituto Evangelico Jasama</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="contacto.html">Matrícula</a></li>
            </ul>
        </nav>
    </header>

    <section>
        <h2>Formulario de Matrícula</h2>

        <form>

            <h3>Datos del Estudiante</h3>

            <input type="text" placeholder="Nombre completo" required>
            <input type="date" required>
            <input type="text" placeholder="Número de identidad" required>

            <select required>
                <option value="">Seleccione el grado</option>
                <option>Preparatoria</option>
                <option>1° Básica</option>
                <option>2° Básica</option>
                <option>3° Básica</option>
                <option>4° Básica</option>
                <option>5° Básica</option>
                <option>6° Básica</option>
                <option>7° Básica</option>
                <option>8° Básica</option>
                <option>9° Básica</option>
                <option>10° Ciencias y Humanidades</option>
                <option>11° Ciencias y Humanidades</option>
                <option>10° Informática</option>
                <option>11° Informática</option>
                <option>12° Informática</option>
                <option>10° Administración</option>
                <option>11° Administración</option>
                <option>12° Administración</option>
            </select>

            <select required>
                <option value="">Seleccione el area </option>
                <option>Bilingüe</option>
                <option>Español</option>
            </select>

            <h3>Datos del Padre / Madre</h3>

            <input type="text" placeholder="Nombre del Padre / Madre" required>
            <input type="tel" placeholder="Teléfono" required>
            <input type="email" placeholder="Correo electrónico" required>
            <input type="text" placeholder="Dirección" required>

            <h3>Información Adicional</h3>

            <textarea placeholder="Observaciones o información adicional"></textarea>

            <button type="submit">Enviar Matrícula</button>

        </form>
    </section>

</main>
    <footer class="footer">
        © Derechos resrvados &copy; David Reyes - 2026    
    </footer>
</body>
</html>
